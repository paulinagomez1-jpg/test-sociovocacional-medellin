<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Vocacional Medellín</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;padding:20px}
.card{background:#111c33;padding:20px;border-radius:15px;margin-bottom:20px}
.hidden{display:none}
select{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none}
button{padding:12px;background:#F36C21;border:none;border-radius:10px;font-weight:bold;margin-top:10px}
.question{margin:10px 0}
a{display:block;margin-top:6px;color:#9ecbff}
</style>
</head>
<body>

<div class="card" id="intro">
<h2>Antes de comenzar</h2>

<select id="ie">
<option value="">Institución</option>
<option>INST EDUC RODRIGO LARA BONILLA</option>
<option>INST EDUC FE Y ALEGRIA LUIS AMIGO</option>
<option>INST EDUC BARRIO OLAYA HERRERA</option>
<option>INST EDUC CAMILO MORA CARRASQUILLA</option>
<option>INST EDUC CIUDAD DON BOSCO</option>
<option>INST EDUC VALLEJUELOS</option>
<option>INST EDUC LUSITANIA- PAZ DE COLOMBIA</option>
<option>INST EDUC FE Y ALEGRIA EL LIMONAR</option>
<option>INST EDUC ANTONIO DERKA - SANTO DOMINGO</option>
<option>INST EDUC FE Y ALEGRIA POPULAR NRO. 1</option>
<option>INST EDUC LA AVANZADA</option>
<option>INST EDUC NUEVO HORIZONTE-PAULO VI</option>
<option>INST EDUC EL PLAYON</option>
<option>INST EDUC PABLO NERUDA</option>
<option>INST EDUC BELLO ORIENTE</option>
<option>INST EDUC JOAQUIN VALLEJO ARBELAEZ</option>
<option>INST EDUC LA LIBERTAD</option>
<option>INST EDUC LA SIERRA</option>
<option>INST EDUC LUIS CARLOS GALAN SARMIENTO</option>
<option>INST EDUC SOL DE ORIENTE</option>
<option>INST EDUC EL CORAZON</option>
<option>INST EDUC FUNDADORES</option>
<option>INST EDUC PRADITO</option>
<option>INST EDUC COLEGIO EMPRESARIAL</option>
</select>

<select id="grado">
<option value="">Grado</option>
<option>9°</option>
<option>10°</option>
<option>11°</option>
</select>

<select id="grupo">
<option value="">Grupo</option>
<option>01</option>
<option>02</option>
<option>03</option>
<option>04</option>
</select>

<button onclick="start()">Comenzar</button>
</div>

<div class="card hidden" id="test">
<h2>Test</h2>
<div id="questions"></div>
<button onclick="result()">Ver resultado</button>
</div>

<div class="card hidden" id="res">
<h2>Resultado</h2>
<p id="out"></p>
<div id="links"></div>
</div>

<script>
let data={}
let respuestas={}

const preguntas=[
"Me llama la atención entender por qué pasan las cosas",
"Disfruto crear ideas nuevas",
"Me gusta ayudar a otros",
"Quiero generar ingresos pronto",
"Prefiero actividades prácticas",
"Me gusta organizar tareas",
"Aprendo investigando",
"Aprendo creando",
"Aprendo con otros",
"Aprendo resolviendo problemas",
"Me gusta liderar",
"Me gustan procesos claros",
"Quiero estudiar varios años",
"Quiero trabajar pronto",
"Quiero emprender",
"Quiero impactar personas",
"Prefiero aprender haciendo",
"Quiero estudiar y trabajar"
]

function start(){
let ie=document.getElementById("ie").value
let grado=document.getElementById("grado").value
let grupo=document.getElementById("grupo").value

if(!ie||!grado||!grupo){
alert("Completa los datos")
return
}

data={ie,grado,grupo}

document.getElementById("intro").classList.add("hidden")
document.getElementById("test").classList.remove("hidden")

render()
}

function render(){
let html=""
preguntas.forEach((p,i)=>{
html+=`
<div class="question">
<p>${i+1}. ${p}</p>
${[1,2,3,4,5].map(v=>`
<label>
<input type="radio" name="q${i}" value="${v}"> ${v}
</label>
`).join("")}
</div>`
})
document.getElementById("questions").innerHTML=html
}

function result(){

let scores={academico:0,tecnico:0,emprendedor:0,social:0,mixto:0}

preguntas.forEach((p,i)=>{
let val=parseInt(document.querySelector(`input[name="q${i}"]:checked`)?.value||3)

if([0,6,12].includes(i)) scores.academico+=val
if([4,9,16].includes(i)) scores.tecnico+=val
if([10,14].includes(i)) scores.emprendedor+=val
if([2,15,8].includes(i)) scores.social+=val
if([3,13,17].includes(i)) scores.mixto+=val
})

let perfil=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b)

let texto={
academico:"Académico-proyección",
tecnico:"Técnico-práctico",
emprendedor:"Emprendimiento-liderazgo",
social:"Creativo-social",
mixto:"Mixto-exploración"
}

let rutas={
academico:[
["Sapiencia","https://sapiencia.gov.co/"],
["UdeA","https://www.udea.edu.co/"],
["IU Digital","https://www.iudigital.edu.co/"]
],
tecnico:[
["SENA","https://www.sena.edu.co/"],
["Pascual Bravo","https://pascualbravo.edu.co/"],
["ITM","https://www.itm.edu.co/"]
],
emprendedor:[
["Ruta N","https://rutanmedellin.org/"],
["Fondo Emprender","https://www.fondoemprender.com/"]
],
social:[
["Medellín Joven","https://observatorio.medellinjoven.com/oportunidades"],
["Arroba Medellín","https://arrobamedellin.edu.co/"]
],
mixto:[
["Talento Tech","https://talentotech.gov.co/"],
["Coursera","https://www.coursera.org/"],
["edX","https://www.edx.org/"]
]
}

document.getElementById("res").classList.remove("hidden")

document.getElementById("out").innerText=
`Perfil: ${texto[perfil]}
Institución: ${data.ie}
Grupo: ${data.grado}-${data.grupo}`

document.getElementById("links").innerHTML=
"<h3>Opciones recomendadas:</h3>"+
rutas[perfil].map(x=>`<a href="${x[1]}" target="_blank">${x[0]}</a>`).join("")
}
</script>

</body>
</html>
